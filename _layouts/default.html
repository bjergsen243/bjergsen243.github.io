<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/images/pochacco-favicon.png" />
  </head>

  <body>
    <!-- Sparkle canvas background -->
    <canvas id="sparkle-canvas"></canvas>

    <!-- Running Pochacco -->
    <div class="pochacco-runner">
      <img src="{{ site.baseurl }}/images/pochacco-running.png" alt="" />
    </div>

    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/about">About</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <p style="margin-top: 10px; font-size: 13px; color: #999;">
            Made with <span style="color: #FFB6C1;">&#10084;</span> and Pochacco vibes
          </p>
        </footer>
      </div>
    </div>

    <!-- Floating Pochacco corner decoration -->
    <div class="pochacco-float-corner">
      <img src="{{ site.baseurl }}/images/pochacco-walk.png" alt="" />
    </div>

    <script>
      // === Sparkle / Star Background ===
      (function() {
        var canvas = document.getElementById('sparkle-canvas');
        var ctx = canvas.getContext('2d');
        var sparkles = [];
        var maxSparkles = 50;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = document.body.scrollHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function Sparkle() {
          this.reset();
        }
        Sparkle.prototype.reset = function() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 3 + 1;
          this.opacity = Math.random() * 0.5 + 0.2;
          this.speed = Math.random() * 0.02 + 0.01;
          this.angle = Math.random() * Math.PI * 2;
          this.growing = Math.random() > 0.5;
          // Pochacco palette colors
          var colors = ['#89CFF0', '#B5EAD7', '#FFB6C1', '#FFEAA7', '#a8d8ea'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        };
        Sparkle.prototype.update = function() {
          if (this.growing) {
            this.opacity += this.speed;
            if (this.opacity >= 0.8) this.growing = false;
          } else {
            this.opacity -= this.speed;
            if (this.opacity <= 0.1) this.growing = true;
          }
          this.angle += 0.01;
          this.x += Math.sin(this.angle) * 0.3;
          this.y -= 0.15;
          if (this.y < -10) {
            this.y = canvas.height + 10;
            this.x = Math.random() * canvas.width;
          }
        };
        Sparkle.prototype.draw = function() {
          ctx.save();
          ctx.globalAlpha = this.opacity;
          ctx.fillStyle = this.color;
          ctx.translate(this.x, this.y);
          // Draw a 4-point star
          ctx.beginPath();
          for (var i = 0; i < 4; i++) {
            var rot = (Math.PI / 2) * i + this.angle;
            ctx.lineTo(Math.cos(rot) * this.size * 2, Math.sin(rot) * this.size * 2);
            ctx.lineTo(Math.cos(rot + Math.PI / 4) * this.size * 0.7, Math.sin(rot + Math.PI / 4) * this.size * 0.7);
          }
          ctx.closePath();
          ctx.fill();
          // Glow effect
          ctx.shadowBlur = 8;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.restore();
        };

        for (var i = 0; i < maxSparkles; i++) {
          sparkles.push(new Sparkle());
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          sparkles.forEach(function(s) {
            s.update();
            s.draw();
          });
          requestAnimationFrame(animate);
        }
        animate();
      })();

      // === Paw trail on click ===
      document.addEventListener('click', function(e) {
        var paw = document.createElement('div');
        paw.className = 'paw-trail';
        paw.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">' +
          '<ellipse cx="12" cy="16" rx="6" ry="5" fill="#89CFF0" opacity="0.8"/>' +
          '<circle cx="6" cy="8" r="3" fill="#89CFF0" opacity="0.8"/>' +
          '<circle cx="12" cy="5" r="3" fill="#89CFF0" opacity="0.8"/>' +
          '<circle cx="18" cy="8" r="3" fill="#89CFF0" opacity="0.8"/>' +
          '</svg>';
        paw.style.left = (e.pageX - 12) + 'px';
        paw.style.top = (e.pageY - 12) + 'px';
        document.body.appendChild(paw);
        setTimeout(function() { paw.remove(); }, 1200);
      });

      // === Sparkle burst on cursor move (throttled) ===
      var lastSparkle = 0;
      document.addEventListener('mousemove', function(e) {
        var now = Date.now();
        if (now - lastSparkle < 80) return;
        lastSparkle = now;
        var dot = document.createElement('div');
        dot.className = 'cursor-sparkle';
        var colors = ['#89CFF0', '#B5EAD7', '#FFB6C1', '#FFEAA7'];
        dot.style.background = colors[Math.floor(Math.random() * colors.length)];
        dot.style.left = e.pageX + 'px';
        dot.style.top = e.pageY + 'px';
        document.body.appendChild(dot);
        setTimeout(function() { dot.remove(); }, 600);
      });
    </script>

    {% include analytics.html %}
  </body>
</html>

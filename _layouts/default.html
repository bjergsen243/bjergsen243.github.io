<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/images/pochacco-favicon.png" />
    <style>
      html, body, * { cursor: url('{{ site.baseurl }}/images/pochacco-cursor-32.png') 6 2, auto !important; }
      a, button, [role="button"], input[type="submit"], select, label[for] { cursor: url('{{ site.baseurl }}/images/pochacco-pointer-32.png') 6 2, pointer !important; }
    </style>
  </head>

  <body>
    <canvas id="sparkle-canvas"></canvas>

    <!-- Decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="page-wrap">
      <div class="wrapper-masthead">
        <div class="container">
          <header class="masthead clearfix">
            <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>

            <div class="site-info">
              <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
              <p class="site-description">{{ site.description }}</p>
            </div>

            <nav>
              <a href="{{ site.baseurl }}/">Blog</a>
              <a href="{{ site.baseurl }}/about">About</a>
            </nav>
          </header>
        </div>
      </div>

      <div id="main" role="main" class="container">
        {{ content }}
      </div>
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          <div class="footer-inner">
            {% include svg-icons.html %}
            <span class="footer-divider">·</span>
            <span class="footer-text">Made with <span class="heart">&#10084;</span> &amp; Pochacco</span>
          </div>
        </footer>
      </div>
    </div>

    <!-- Corner stickers — small, positioned as accents -->
    <img src="{{ site.baseurl }}/images/pochacco-7.png" alt="" class="corner-sticker corner-tl" />
    <img src="{{ site.baseurl }}/images/pochacco-3.png" alt="" class="corner-sticker corner-br" />

    <script>
    (function() {
      var c = document.getElementById('sparkle-canvas'), x = c.getContext('2d'), s = [];
      var P = ['#89CFF0','#B5EAD7','#FFB6C1','#FFEAA7','#DDA0DD','#E8D5F5'];
      function R() { c.width = innerWidth; c.height = innerHeight; }
      R(); addEventListener('resize', R);
      function S() { this.x=Math.random()*c.width; this.y=Math.random()*c.height;
        this.r=.4+Math.random()*1.8; this.p=Math.random()*6.28; this.sp=.005+Math.random()*.012;
        this.col=P[Math.random()*P.length|0]; }
      S.prototype.d = function() { this.p+=this.sp; var a=.06+Math.sin(this.p)*.1;
        if(a<=0)return; x.save(); x.globalAlpha=a; x.fillStyle=this.col; x.beginPath();
        for(var i=0;i<4;i++){var g=1.5708*i+this.p;
        x.lineTo(this.x+Math.cos(g)*this.r*2.5,this.y+Math.sin(g)*this.r*2.5);
        x.lineTo(this.x+Math.cos(g+.785)*this.r*.5,this.y+Math.sin(g+.785)*this.r*.5);}
        x.closePath(); x.fill(); x.restore(); };
      for(var i=0;i<35;i++) s.push(new S());
      (function l(){x.clearRect(0,0,c.width,c.height);s.forEach(function(v){v.d()});requestAnimationFrame(l)})();
    })();
    </script>

    {% include analytics.html %}
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/images/pochacco-favicon.png" />
    <style>
      html, body, * { cursor: url('{{ site.baseurl }}/images/pochacco-cursor-32.png') 6 2, auto !important; }
      a, button, [role="button"], input[type="submit"], select, label[for] { cursor: url('{{ site.baseurl }}/images/pochacco-pointer-32.png') 6 2, pointer !important; }
    </style>
  </head>

  <body>
    <!-- Subtle sparkle canvas -->
    <canvas id="sparkle-canvas"></canvas>

    <div class="page-wrap">
      <div class="wrapper-masthead">
        <div class="container">
          <header class="masthead clearfix">
            <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>

            <div class="site-info">
              <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
              <p class="site-description">{{ site.description }}</p>
            </div>

            <nav>
              <a href="{{ site.baseurl }}/">Blog</a>
              <a href="{{ site.baseurl }}/about">About</a>
            </nav>
          </header>
        </div>
      </div>

      <div id="main" role="main" class="container">
        {{ content }}
      </div>
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <div class="footer-row">
            <img src="{{ site.baseurl }}/images/pochacco-6.png" alt="" class="footer-sticker" />
            <span class="footer-text">Made with <span class="heart">&#10084;</span> &amp; Pochacco vibes</span>
            <img src="{{ site.baseurl }}/images/pochacco-10.png" alt="" class="footer-sticker" />
          </div>
        </footer>
      </div>
    </div>

    <!-- Background stickers — all clean transparent PNGs/GIFs -->
    <div class="bg-sticker bg-sticker-1"><img src="{{ site.baseurl }}/images/pochacco-7.png" alt="" /></div>
    <div class="bg-sticker bg-sticker-2"><img src="{{ site.baseurl }}/images/pompompurin.png" alt="" /></div>
    <div class="bg-sticker bg-sticker-3"><img src="{{ site.baseurl }}/images/pochacco-hello.gif" alt="" /></div>
    <div class="bg-sticker bg-sticker-4"><img src="{{ site.baseurl }}/images/mymelody.png" alt="" /></div>
    <div class="bg-sticker bg-sticker-5"><img src="{{ site.baseurl }}/images/pochacco-3.png" alt="" /></div>
    <div class="bg-sticker bg-sticker-6"><img src="{{ site.baseurl }}/images/pochacco-5.png" alt="" /></div>

    <script>
    (function() {
      'use strict';

      // ─── Subtle sparkle canvas ───
      var canvas = document.getElementById('sparkle-canvas');
      var ctx = canvas.getContext('2d');
      var sparkles = [];
      var palette = ['#89CFF0','#B5EAD7','#FFB6C1','#FFEAA7','#DDA0DD'];

      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      function Sparkle() { this.reset(); }
      Sparkle.prototype.reset = function() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.r = 0.5 + Math.random() * 1.5;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.006 + Math.random() * 0.012;
        this.color = palette[Math.floor(Math.random() * palette.length)];
      };
      Sparkle.prototype.draw = function() {
        this.phase += this.speed;
        var a = 0.08 + Math.sin(this.phase) * 0.12;
        if (a <= 0) return;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        for (var i = 0; i < 4; i++) {
          var ang = (Math.PI/2)*i + this.phase;
          ctx.lineTo(this.x + Math.cos(ang)*this.r*2.5, this.y + Math.sin(ang)*this.r*2.5);
          ctx.lineTo(this.x + Math.cos(ang+Math.PI/4)*this.r*0.5, this.y + Math.sin(ang+Math.PI/4)*this.r*0.5);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      };

      for (var i = 0; i < 30; i++) sparkles.push(new Sparkle());
      (function loop() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        sparkles.forEach(function(s) { s.draw(); });
        requestAnimationFrame(loop);
      })();
    })();
    </script>

    {% include analytics.html %}
  </body>
</html>

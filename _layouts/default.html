<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/images/pochacco-favicon.png" />
  </head>

  <body>
    <!-- Sparkle + floating characters canvas -->
    <canvas id="sparkle-canvas"></canvas>

    <!-- Floating Pochacco & friends that randomly appear -->
    <div id="floating-characters" aria-hidden="true"></div>

    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/about">About</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <div class="footer-pochacco">
            <img src="{{ site.baseurl }}/images/pochacco-5.png" alt="" class="footer-character" />
            <p>Made with <span class="heart">&#10084;</span> and Pochacco vibes</p>
            <img src="{{ site.baseurl }}/images/pochacco-6.png" alt="" class="footer-character" />
          </div>
        </footer>
      </div>
    </div>

    <script>
    (function() {
      'use strict';

      // ─── Character image pool ───
      var characters = [
        { src: '{{ site.baseurl }}/images/pochacco-1.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-3.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-4.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-5.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-6.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-7.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-8.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-9.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/pochacco-10.png', name: 'pochacco' },
        { src: '{{ site.baseurl }}/images/cinnamoroll.png', name: 'cinnamoroll' },
        { src: '{{ site.baseurl }}/images/pompompurin.png', name: 'pompompurin' },
        { src: '{{ site.baseurl }}/images/mymelody.png', name: 'mymelody' }
      ];

      // ─── Floating characters that drift across the page ───
      var container = document.getElementById('floating-characters');
      var activeChars = [];
      var maxChars = 6;

      function spawnCharacter() {
        if (activeChars.length >= maxChars) return;

        var char = characters[Math.floor(Math.random() * characters.length)];
        var el = document.createElement('div');
        el.className = 'floating-char';

        var img = document.createElement('img');
        img.src = char.src;
        img.alt = '';
        el.appendChild(img);

        // Random size between 40-80px
        var size = 40 + Math.random() * 40;
        el.style.width = size + 'px';

        // Random starting position
        var side = Math.random();
        var pageH = Math.max(document.body.scrollHeight, window.innerHeight);
        if (side < 0.25) {
          // From left
          el.style.left = '-80px';
          el.style.top = (Math.random() * pageH * 0.7 + pageH * 0.1) + 'px';
          el.dataset.dx = (0.3 + Math.random() * 0.5).toString();
          el.dataset.dy = (-0.2 + Math.random() * 0.4).toString();
        } else if (side < 0.5) {
          // From right
          el.style.left = (window.innerWidth + 10) + 'px';
          el.style.top = (Math.random() * pageH * 0.7 + pageH * 0.1) + 'px';
          el.dataset.dx = (-0.3 - Math.random() * 0.5).toString();
          el.dataset.dy = (-0.2 + Math.random() * 0.4).toString();
        } else {
          // From top
          el.style.left = (Math.random() * window.innerWidth) + 'px';
          el.style.top = '-80px';
          el.dataset.dx = (-0.3 + Math.random() * 0.6).toString();
          el.dataset.dy = (0.2 + Math.random() * 0.4).toString();
        }

        // Wobble parameters
        el.dataset.wobble = (Math.random() * Math.PI * 2).toString();
        el.dataset.wobbleSpeed = (0.01 + Math.random() * 0.02).toString();
        el.dataset.wobbleAmp = (5 + Math.random() * 15).toString();

        el.style.opacity = (0.25 + Math.random() * 0.35).toString();
        container.appendChild(el);
        activeChars.push(el);
      }

      function updateCharacters() {
        for (var i = activeChars.length - 1; i >= 0; i--) {
          var el = activeChars[i];
          var x = parseFloat(el.style.left);
          var y = parseFloat(el.style.top);
          var dx = parseFloat(el.dataset.dx);
          var dy = parseFloat(el.dataset.dy);
          var wobble = parseFloat(el.dataset.wobble);
          var wobbleSpeed = parseFloat(el.dataset.wobbleSpeed);
          var wobbleAmp = parseFloat(el.dataset.wobbleAmp);

          wobble += wobbleSpeed;
          el.dataset.wobble = wobble.toString();

          x += dx;
          y += dy;
          var visualX = x + Math.sin(wobble) * wobbleAmp;

          el.style.left = x + 'px';
          el.style.top = y + 'px';
          el.style.transform = 'translateX(' + (Math.sin(wobble) * wobbleAmp) + 'px) rotate(' + (Math.sin(wobble) * 5) + 'deg)';

          // Remove if off-screen
          var pageH = Math.max(document.body.scrollHeight, window.innerHeight);
          if (x < -150 || x > window.innerWidth + 150 || y < -150 || y > pageH + 150) {
            el.remove();
            activeChars.splice(i, 1);
          }
        }
        requestAnimationFrame(updateCharacters);
      }

      // Spawn characters periodically
      spawnCharacter();
      spawnCharacter();
      spawnCharacter();
      setInterval(spawnCharacter, 4000);
      updateCharacters();

      // ─── Sparkle canvas background ───
      var canvas = document.getElementById('sparkle-canvas');
      var ctx = canvas.getContext('2d');
      var sparkles = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = Math.max(document.body.scrollHeight, window.innerHeight);
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      var sparkleColors = ['#89CFF0', '#B5EAD7', '#FFB6C1', '#FFEAA7', '#DDA0DD', '#a8d8ea'];

      function Sparkle() { this.reset(); }
      Sparkle.prototype.reset = function() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.5 + 0.5;
        this.opacity = Math.random() * 0.4 + 0.1;
        this.speed = Math.random() * 0.015 + 0.005;
        this.angle = Math.random() * Math.PI * 2;
        this.growing = Math.random() > 0.5;
        this.color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        this.twinkleOffset = Math.random() * Math.PI * 2;
      };
      Sparkle.prototype.update = function() {
        this.twinkleOffset += this.speed;
        this.opacity = 0.15 + Math.sin(this.twinkleOffset) * 0.25;
        this.x += Math.sin(this.angle + this.twinkleOffset * 0.5) * 0.15;
        this.y -= 0.08;
        if (this.y < -5) { this.y = canvas.height + 5; this.x = Math.random() * canvas.width; }
      };
      Sparkle.prototype.draw = function() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.fillStyle = this.color;
        ctx.translate(this.x, this.y);
        // 4-point star
        ctx.beginPath();
        for (var i = 0; i < 4; i++) {
          var r = (Math.PI / 2) * i + this.twinkleOffset;
          ctx.lineTo(Math.cos(r) * this.size * 2, Math.sin(r) * this.size * 2);
          ctx.lineTo(Math.cos(r + Math.PI / 4) * this.size * 0.5, Math.sin(r + Math.PI / 4) * this.size * 0.5);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      };

      for (var i = 0; i < 40; i++) sparkles.push(new Sparkle());

      function animateSparkles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        sparkles.forEach(function(s) { s.update(); s.draw(); });
        requestAnimationFrame(animateSparkles);
      }
      animateSparkles();

      // ─── Cursor sparkle trail ───
      var lastSparkleTime = 0;
      document.addEventListener('mousemove', function(e) {
        var now = Date.now();
        if (now - lastSparkleTime < 60) return;
        lastSparkleTime = now;
        var dot = document.createElement('div');
        dot.className = 'cursor-sparkle';
        dot.style.background = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        dot.style.left = e.pageX + 'px';
        dot.style.top = e.pageY + 'px';
        var s = 3 + Math.random() * 5;
        dot.style.width = s + 'px';
        dot.style.height = s + 'px';
        document.body.appendChild(dot);
        setTimeout(function() { dot.remove(); }, 700);
      });

      // ─── Paw trail on click ───
      document.addEventListener('click', function(e) {
        var paw = document.createElement('div');
        paw.className = 'paw-trail';
        paw.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">' +
          '<ellipse cx="12" cy="16" rx="6" ry="5" fill="#89CFF0" opacity="0.8"/>' +
          '<circle cx="6" cy="8" r="3" fill="#89CFF0" opacity="0.8"/>' +
          '<circle cx="12" cy="5" r="3" fill="#89CFF0" opacity="0.8"/>' +
          '<circle cx="18" cy="8" r="3" fill="#89CFF0" opacity="0.8"/>' +
          '</svg>';
        paw.style.left = (e.pageX - 12) + 'px';
        paw.style.top = (e.pageY - 12) + 'px';
        document.body.appendChild(paw);
        setTimeout(function() { paw.remove(); }, 1200);
      });
    })();
    </script>

    {% include analytics.html %}
  </body>
</html>

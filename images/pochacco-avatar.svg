<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#E8F4FD" stroke="#89CFF0" stroke-width="3"/>

  <!-- Body -->
  <ellipse cx="60" cy="95" rx="25" ry="18" fill="white" stroke="#333" stroke-width="2"/>

  <!-- Blue shirt/outfit -->
  <ellipse cx="60" cy="95" rx="23" ry="16" fill="#89CFF0"/>
  <rect x="37" y="88" width="46" height="14" rx="5" fill="#89CFF0"/>

  <!-- Head shape (white) -->
  <ellipse cx="60" cy="55" rx="28" ry="26" fill="white" stroke="#333" stroke-width="2"/>

  <!-- Left ear -->
  <ellipse cx="38" cy="30" rx="10" ry="16" fill="white" stroke="#333" stroke-width="2" transform="rotate(-15 38 30)"/>
  <!-- Right ear -->
  <ellipse cx="82" cy="30" rx="10" ry="16" fill="white" stroke="#333" stroke-width="2" transform="rotate(15 82 30)"/>

  <!-- Left ear inner -->
  <ellipse cx="38" cy="28" rx="6" ry="10" fill="#89CFF0" transform="rotate(-15 38 28)"/>
  <!-- Right ear inner -->
  <ellipse cx="82" cy="28" rx="6" ry="10" fill="#89CFF0" transform="rotate(15 82 28)"/>

  <!-- Blue beret -->
  <path d="M38 42 Q60 20 82 42 Q60 32 38 42Z" fill="#89CFF0" stroke="#333" stroke-width="1.5"/>
  <!-- Beret pom -->
  <circle cx="60" cy="24" r="4" fill="#89CFF0" stroke="#333" stroke-width="1.5"/>

  <!-- Left eye -->
  <circle cx="50" cy="52" r="4" fill="#333"/>
  <!-- Right eye -->
  <circle cx="70" cy="52" r="4" fill="#333"/>
  <!-- Eye shine left -->
  <circle cx="51.5" cy="50.5" r="1.5" fill="white"/>
  <!-- Eye shine right -->
  <circle cx="71.5" cy="50.5" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="60" cy="60" rx="3" ry="2" fill="#333"/>

  <!-- Mouth -->
  <path d="M52 65 Q60 73 68 65" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="42" cy="62" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="78" cy="62" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
</svg>

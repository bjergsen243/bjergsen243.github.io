<svg xmlns="http://www.w3.org/2000/svg" width="40" height="60" viewBox="0 0 40 60">
  <!-- Ice cream cone -->
  <polygon points="12,28 28,28 22,58 18,58" fill="#D4A054" stroke="#B8863C" stroke-width="1"/>
  <!-- Waffle pattern -->
  <line x1="14" y1="32" x2="24" y2="52" stroke="#B8863C" stroke-width="0.5" opacity="0.5"/>
  <line x1="18" y1="28" x2="20" y2="58" stroke="#B8863C" stroke-width="0.5" opacity="0.5"/>
  <line x1="26" y1="32" x2="19" y2="55" stroke="#B8863C" stroke-width="0.5" opacity="0.5"/>
  <!-- Bottom scoop (strawberry) -->
  <circle cx="20" cy="22" r="12" fill="#FFB6C1"/>
  <circle cx="16" cy="20" r="2" fill="#FF9AAC" opacity="0.5"/>
  <circle cx="24" cy="24" r="1.5" fill="#FF9AAC" opacity="0.5"/>
  <!-- Top scoop (vanilla/banana - Pochacco's favorite!) -->
  <circle cx="20" cy="10" r="10" fill="#FFEAA7"/>
  <circle cx="17" cy="8" r="2" fill="#FFD93D" opacity="0.4"/>
  <circle cx="23" cy="12" r="1.5" fill="#FFD93D" opacity="0.4"/>
  <!-- Cherry on top -->
  <circle cx="20" cy="2" r="3" fill="#FF6B6B"/>
  <path d="M20 2 Q22 -2 24 0" fill="none" stroke="#4A7C2E" stroke-width="1" stroke-linecap="round"/>
  <!-- Shine -->
  <ellipse cx="15" cy="7" rx="2" ry="3" fill="white" opacity="0.3" transform="rotate(-15 15 7)"/>
</svg>

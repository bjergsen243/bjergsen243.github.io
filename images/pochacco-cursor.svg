<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pochacco face cursor -->
  <!-- Head shape (white) -->
  <ellipse cx="16" cy="17" rx="12" ry="11" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Left ear -->
  <ellipse cx="7" cy="8" rx="5" ry="7" fill="white" stroke="#333" stroke-width="1.5" transform="rotate(-15 7 8)"/>
  <!-- Right ear -->
  <ellipse cx="25" cy="8" rx="5" ry="7" fill="white" stroke="#333" stroke-width="1.5" transform="rotate(15 25 8)"/>
  <!-- Left ear inner (blue cap patch) -->
  <ellipse cx="7" cy="7" rx="3" ry="4.5" fill="#89CFF0" transform="rotate(-15 7 7)"/>
  <!-- Right ear inner -->
  <ellipse cx="25" cy="7" rx="3" ry="4.5" fill="#89CFF0" transform="rotate(15 25 7)"/>
  <!-- Blue beret/cap -->
  <path d="M8 12 Q16 3 24 12 Q16 8 8 12Z" fill="#89CFF0" stroke="#333" stroke-width="1"/>
  <!-- Left eye -->
  <circle cx="12" cy="16" r="2" fill="#333"/>
  <!-- Right eye -->
  <circle cx="20" cy="16" r="2" fill="#333"/>
  <!-- Eye shine left -->
  <circle cx="12.7" cy="15.3" r="0.7" fill="white"/>
  <!-- Eye shine right -->
  <circle cx="20.7" cy="15.3" r="0.7" fill="white"/>
  <!-- Nose -->
  <ellipse cx="16" cy="19" rx="1.5" ry="1" fill="#333"/>
  <!-- Mouth -->
  <path d="M13 21 Q16 24 19 21" fill="none" stroke="#333" stroke-width="1" stroke-linecap="round"/>
  <!-- Cheek blush left -->
  <ellipse cx="9" cy="20" rx="2.5" ry="1.5" fill="#FFB6C1" opacity="0.5"/>
  <!-- Cheek blush right -->
  <ellipse cx="23" cy="20" rx="2.5" ry="1.5" fill="#FFB6C1" opacity="0.5"/>
</svg>

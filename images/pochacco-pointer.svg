<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <!-- Pochacco pointer cursor (winking) -->
  <!-- Head shape (white) -->
  <ellipse cx="18" cy="19" rx="13" ry="12" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Left ear -->
  <ellipse cx="8" cy="9" rx="5" ry="7" fill="white" stroke="#333" stroke-width="1.5" transform="rotate(-20 8 9)"/>
  <!-- Right ear -->
  <ellipse cx="28" cy="9" rx="5" ry="7" fill="white" stroke="#333" stroke-width="1.5" transform="rotate(20 28 9)"/>
  <!-- Left ear inner -->
  <ellipse cx="8" cy="8" rx="3" ry="4.5" fill="#89CFF0" transform="rotate(-20 8 8)"/>
  <!-- Right ear inner -->
  <ellipse cx="28" cy="8" rx="3" ry="4.5" fill="#89CFF0" transform="rotate(20 28 8)"/>
  <!-- Blue beret -->
  <path d="M9 13 Q18 4 27 13 Q18 9 9 13Z" fill="#89CFF0" stroke="#333" stroke-width="1"/>
  <!-- Left eye (wink) -->
  <path d="M11 17 Q13.5 15 16 17" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right eye -->
  <circle cx="22" cy="17" r="2.2" fill="#333"/>
  <!-- Eye shine right -->
  <circle cx="22.8" cy="16.2" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="18" cy="21" rx="1.5" ry="1" fill="#333"/>
  <!-- Mouth (happy) -->
  <path d="M14 23 Q18 27 22 23" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cheek blush left -->
  <ellipse cx="10" cy="22" rx="2.5" ry="1.5" fill="#FFB6C1" opacity="0.5"/>
  <!-- Cheek blush right -->
  <ellipse cx="26" cy="22" rx="2.5" ry="1.5" fill="#FFB6C1" opacity="0.5"/>
  <!-- Little paw pointer -->
  <circle cx="32" cy="32" r="3" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="30" cy="29" r="1.5" fill="white" stroke="#333" stroke-width="0.8"/>
  <circle cx="33" cy="29" r="1.5" fill="white" stroke="#333" stroke-width="0.8"/>
</svg>
